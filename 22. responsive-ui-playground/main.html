<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive UI Playground</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="box-fifty-percent">50%</div>
    <div class="one-hundred-pixels">100px</div>
    <div class="box-fifty-vw">50vw</div>
    <div class="box-twenty-vh">25vh</div>
    <hr>

    <div class="parent">
        <div class="box-fifty-percent">50%</div>
        <div class="one-hundred-pixels">100px</div>
        <div class="box-fifty-vw">50vw</div>
        <div class="box-twenty-vh">25vh</div>
    </div>

    <!-- 

    % - adjusts to the parent’s size (can also be used for font size, like em)
    px - fixed size; doesn’t adjust
    vw - adjusts to viewport width (100vw = full screen width; can exceed 100vw if you want a scrollbar)
    vh - adjusts to viewport height (100vh = full screen height; can exceed 100vh)
    rem - always based on the root element’s (html) font-size (for consistency across the page)
    em - always looks up to the nearest parent with a computed font-size and scales accordingly

    -->


</body>
</html>
